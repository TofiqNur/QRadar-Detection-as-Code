name: QRadar Rule Sync
on:
  push:
    paths:
      - 'rules/qradar/**' # Ancaq rule qovluğunda dəyişiklik olanda işləsin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Sync Script
        env:
          QRADAR_IP: ${{ secrets.QRADAR_IP }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/qradar_sync.py
